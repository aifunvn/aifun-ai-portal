<!DOCTYPE html>
<html lang="vi" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="AIFUN OS — AI Workspace cho doanh nghiệp Việt Nam">
  <title>AIFUN OS V4</title>
  <link rel="icon" href="/favicon.svg">
  <!-- Preconnect to CDN so Supabase module loads faster on slow networks -->
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
  <link rel="stylesheet" href="/styles/tokens.css">
  <link rel="stylesheet" href="/styles/base.css">
  <link rel="stylesheet" href="/styles/layout.css">
  <link rel="stylesheet" href="/styles/sidebar.css">
  <link rel="stylesheet" href="/styles/topbar.css">
  <link rel="stylesheet" href="/styles/auth.css">
  <link rel="stylesheet" href="/styles/dashboard.css">
  <link rel="stylesheet" href="/styles/builders.css">
  <link rel="stylesheet" href="/styles/markdown.css">
  <link rel="stylesheet" href="/styles/documents.css">
  <link rel="stylesheet" href="/styles/marketplace.css">
  <link rel="stylesheet" href="/styles/history.css">
  <link rel="stylesheet" href="/styles/settings.css">
  <link rel="stylesheet" href="/styles/organization.css">
</head>
<body>
  <div id="v4-root">
    <div id="v4-boot" style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:12px;font-family:sans-serif;color:#64748b;">
      <div style="width:36px;height:36px;border:3px solid #e2e8f0;border-top-color:#6366f1;border-radius:50%;animation:spin .8s linear infinite;"></div>
      <span style="font-size:.9rem;">Đang khởi động AIFUN OS V4…</span>
    </div>
  </div>
  <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
  <script>
    // ── Pre-bootstrap storage sanity check ────────────────────────
    // Clears corrupt Supabase auth entries before the module loads.
    // A malformed JSON token causes getSession() to hang, freezing boot.
    // Fully guarded — safe on data: URLs, incognito strict mode, sandboxed iframes.
    (function _sanitizeStorage() {
      var keys;
      try { keys = Object.keys(localStorage); }
      catch (e) { console.warn('[AIFUN] localStorage unavailable:', e.message); return; }
      for (var i = 0; i < keys.length; i++) {
        var k = keys[i];
        if (k.indexOf('-auth-token') !== -1 || k.indexOf('sb-') === 0) {
          try {
            var raw; try { raw = localStorage.getItem(k); } catch (_) { continue; }
            JSON.parse(raw);
          } catch (parseErr) {
            console.warn('[AIFUN] Corrupt storage entry cleared:', k);
            try { localStorage.removeItem(k); } catch (_) {}
          }
        }
      }
    })();

    // ── Known non-fatal CDN errors (suppress before boot handlers run) ──
    // @iceberg-js is a transitive dep of @supabase/realtime-js.
    // AIFUN V4 does not use Supabase Realtime — this error is non-fatal.
    // Suppressing it here prevents it from triggering boot failure.
    function _isIcebergError(msg, filename) {
      if (filename && filename.indexOf('onboarding.js') !== -1) return true;
      if (msg && (msg.indexOf('getImageNode') !== -1 || msg.indexOf('getImageMode') !== -1)) return true;
      return false;
    }

    // ── Boot timeout: max 5 s — accommodates CDN load time on slow networks ──
    var _bootTimer = setTimeout(function() {
      var boot = document.getElementById('v4-boot');
      var root = document.getElementById('v4-root');
      if (boot && root && root.childElementCount <= 1 && root.contains(boot)) {
        console.warn('[AIFUN] Boot timeout — rendering recovery UI');
        boot.innerHTML =
          '<div style="text-align:center;padding:24px;max-width:480px">' +
          '<div style="font-size:2rem;margin-bottom:12px">&#9200;</div>' +
          '<p style="font-weight:700;color:#0f172a;margin:0 0 8px">Khoi dong mat qua lau</p>' +
          '<p style="color:#64748b;font-size:.85rem;margin:0 0 16px">Co the do cache cu hoac ket noi mang cham.</p>' +
          '<button onclick="try{localStorage.clear()}catch(_){}location.reload()" style="margin-right:8px;padding:8px 16px;background:#ef4444;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:.85rem">Xoa cache &amp; tai lai</button>' +
          '<button onclick="location.reload()" style="padding:8px 16px;background:#6366f1;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:.85rem">Thu lai</button>' +
          '</div>';
      }
    }, 15000);

    // Called by app.js when boot succeeds — cancels the timeout
    window.__aifunBootReady = function() { clearTimeout(_bootTimer); };

    // ── Module-level error handler (parse errors, CDN failures) ──
    window.addEventListener('error', function(e) {
      // Suppress non-fatal iceberg-js errors from supabase/realtime-js
      if (_isIcebergError(e.message, e.filename)) {
        console.warn('[AIFUN] Suppressed non-fatal CDN error (iceberg-js):', e.message);
        e.preventDefault();
        return;
      }
      clearTimeout(_bootTimer);
      console.warn('[AIFUN] Module error:', e.message);
      var boot = document.getElementById('v4-boot');
      if (boot) boot.innerHTML =
        '<div style="text-align:center;padding:24px;max-width:480px">' +
        '<div style="font-size:2rem;margin-bottom:12px">&#9888;&#65039;</div>' +
        '<p style="font-weight:700;color:#0f172a;margin:0 0 8px">Khong the tai AIFUN OS V4</p>' +
        '<p style="color:#64748b;font-size:.85rem;margin:0 0 16px">Loi: ' + (e.message || e.filename || 'Module load failed') + '</p>' +
        '<button onclick="try{localStorage.clear()}catch(_){}location.reload()" style="margin-right:8px;padding:8px 16px;background:#ef4444;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:.85rem">Xoa cache &amp; tai lai</button>' +
        '<button onclick="location.reload()" style="padding:8px 16px;background:#6366f1;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:.9rem">Thu lai</button>' +
        '</div>';
    });

    // ── Unhandled promise rejection ───────────────────────────────
    window.addEventListener('unhandledrejection', function(e) {
      var msg = (e.reason && e.reason.message) || String(e.reason) || '';
      var filename = (e.reason && e.reason.stack) || '';
      // Suppress non-fatal iceberg-js/onboarding.js rejections
      if (_isIcebergError(msg, filename)) {
        console.warn('[AIFUN] Suppressed non-fatal CDN rejection (iceberg-js):', msg);
        e.preventDefault();
        return;
      }
      clearTimeout(_bootTimer);
      var boot = document.getElementById('v4-boot');
      var root = document.getElementById('v4-root');
      if (boot && root && root.contains(boot)) {
        console.warn('[AIFUN] Unhandled rejection during boot:', e.reason);
        boot.innerHTML =
          '<div style="text-align:center;padding:24px;max-width:480px">' +
          '<div style="font-size:2rem;margin-bottom:12px">&#9888;&#65039;</div>' +
          '<p style="font-weight:700;color:#0f172a;margin:0 0 8px">Loi khoi dong</p>' +
          '<p style="color:#64748b;font-size:.85rem;margin:0 0 16px">' + (msg || 'Unknown error') + '</p>' +
          '<button onclick="try{localStorage.clear()}catch(_){}location.reload()" style="margin-right:8px;padding:8px 16px;background:#ef4444;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:.85rem">Xoa cache &amp; tai lai</button>' +
          '<button onclick="location.reload()" style="padding:8px 16px;background:#6366f1;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:.9rem">Thu lai</button>' +
          '</div>';
      }
    });
  </script>
  <!-- Capacitor stub: prevents onboarding.js from crashing the boot.
       @iceberg-js (bundled inside @supabase/realtime-js) calls
       Capacitor.registerPlugin() at CDN eval time. In a web browser
       there is no native Capacitor, so registerPlugin() returns undefined
       and the next call (.getImageNode / .getImageMode) throws a TypeError
       that kills the entire ES module chain before __aifunBootReady fires.
       This stub intercepts registerPlugin and returns a no-op proxy so the
       CDN module evaluates cleanly. Auth and DB features are unaffected. -->
  <script>
    (function _stubCapacitor() {
      if (window.Capacitor && window.Capacitor._aifunStub) return;
      var _noop = function() { return Promise.resolve(null); };
      var _pluginProxy = typeof Proxy !== 'undefined'
        ? new Proxy({}, { get: function() { return _noop; } })
        : { getImageNode: _noop, getImageMode: _noop, initialize: _noop };
      window.Capacitor = {
        _aifunStub:        true,
        isNativePlatform:  function() { return false; },
        isPluginAvailable: function() { return false; },
        getPlatform:       function() { return 'web'; },
        registerPlugin:    function() { return _pluginProxy; },
        Plugins:           _pluginProxy,
      };
    })();
  </script>
  <script src="/config.js"></script>
  <script type="module" src="/src/app/app.js"></script>
</body>
</html>
